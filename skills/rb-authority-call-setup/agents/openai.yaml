display_name: Authority Call Setup
short_description: Set up RB authority call requests in Notion, including required contact availability and entity corrections before submission.
default_prompt: Set up an RB authority call request from minimal details, research and dereference linked Notion records, verify the contact has availability windows, build a private relation map plus a public-safe voice Context Pack with call-critical identifiers, handle user-requested contact or entity corrections when needed, ask only for remaining blockers after research, present the completed form values and linked context for review, then submit the Calls record after approval.
