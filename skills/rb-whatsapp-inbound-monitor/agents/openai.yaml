display_name: WhatsApp Inbound Monitor
short_description: Manually check saved client WhatsApp chats, process inbound communications, create or update task-capable records, notify Slack, and update checkpoints.
default_prompt: Use the saved client WhatsApp checkpoint to inspect only new inbound messages, route attachments into canonical Communications, create or update actionable task-capable Notion records, notify rb-client-updates after approval, and advance the checkpoint only after successful processing.
